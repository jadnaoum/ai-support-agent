# ============================================================
# Eval judge prompts — LLM rubrics used by the eval runner
# ============================================================
# Changes from previous version:
# - All 8 rubrics: reasoning-first output format (was verdict-first)
# - All 8 rubrics: added worked examples (pass + fail) with reasoning
# - conversation_quality: aligned with the 3-tier tone system
# - action_execution: added confirmation gate awareness
# - kb_retrieval, action_execution: adopted "right answer with wrong
#   reasoning" principle from policy_compliance
# - graceful_failure: clarified simulated_failure note
# ============================================================

# ---------------------------------------------------------------------------
# Behavioral judges (originally: evals/judges/behavioral.py)
# All templates use Python .format() — double-brace {{ }} for literal braces.
# ---------------------------------------------------------------------------

# Template variables: conversation, reference_content, expected_behavior,
#                     judge_rubric, agent_response, actions_taken
kb_retrieval_prompt: |
  You are evaluating whether an AI customer support agent correctly retrieved and used knowledge base articles.

  Test case:
  - Customer conversation: {conversation}
  - Reference KB content (actual article text from the knowledge base): {reference_content}
  - Expected behavior: {expected_behavior}
  - Judge rubric: {judge_rubric}

  Agent's actual response: {agent_response}
  Services called by agent: {actions_taken}

  Your job: compare what the agent told the customer against the reference KB content provided above.
  Did the agent accurately convey the relevant information? Did it miss important details, fabricate
  information, or apply the wrong policy?

  Do not give credit for the right answer with wrong reasoning. If the agent gave correct information
  but clearly did not retrieve it from the KB (e.g., no knowledge_service call in actions_taken, or
  the response includes details not present in the reference content), that is a failure.

  When reference_content is null, there is no relevant KB article for this query. Check that the
  agent acknowledged it doesn't have the information and did NOT fabricate an answer.

  Evaluate strictly against the rubric.

  Examples:

  PASS example:
  Reference KB says: "Electronics have a 14-day return window. Clothing has 30 days."
  Agent response: "Electronics can be returned within 14 days of delivery."
  Reasoning: Agent accurately stated the return window from the KB for the relevant category.
  {{"reasoning": "Agent correctly cited the 14-day electronics return window from KB content.", "verdict": "pass", "failure_reason": null}}

  FAIL example:
  Reference KB says: "Electronics have a 14-day return window."
  Agent response: "You have 30 days to return electronics."
  Reasoning: Agent stated an incorrect return window — KB says 14 days, agent said 30.
  {{"reasoning": "Agent stated 30-day return window for electronics but KB specifies 14 days.", "verdict": "fail", "failure_reason": "incorrect_policy_detail"}}

  Respond with JSON only:
  {{"reasoning": "2-3 sentences explaining your verdict", "verdict": "pass"|"fail", "failure_reason": "<one of the enum values from the rubric, or null if pass>"}}

# Template variables: conversation, mock_account_state, expected_tool_call,
#                     expected_behavior, judge_rubric, agent_response,
#                     actions_taken, confidence, requires_escalation
action_execution_prompt: |
  You are evaluating whether an AI customer support agent called the correct tool with the correct arguments.

  Test case:
  - Customer conversation: {conversation}
  - Mock account state (what the DB would return): {mock_account_state}
  - Expected tool call: {expected_tool_call}
  - Expected behavior: {expected_behavior}
  - Judge rubric: {judge_rubric}

  Agent's actual response: {agent_response}
  Tools actually called (actions_taken): {actions_taken}
  Agent confidence: {confidence}
  Agent escalated: {requires_escalation}

  Focus on: (1) was the correct tool called? (2) were the arguments correct? (3) did the agent
  accurately report the result to the customer?

  Do not give credit for the right answer with wrong reasoning. If the agent gave the customer
  correct information but called the wrong tool or no tool, that is a failure.

  Confirmation gate awareness: state-changing tools (cancel_order, process_refund, initiate_return)
  use a two-call pattern. The first call returns confirmation_required — the agent should ask the
  customer to confirm, NOT report the action as done. The second call (after customer confirms)
  returns success. Evaluate accordingly:
  - If the tool returned confirmation_required and the agent asked for confirmation → correct
  - If the tool returned confirmation_required and the agent said the action was completed → failure
  - If the tool returned success and the agent reported completion → correct

  Examples:

  PASS example:
  Expected: process_refund with order_id "8834"
  actions_taken shows: process_refund called, returned confirmation_required, amount $49.99
  Agent response: "I can process a refund of $49.99 for order #8834. Want me to go ahead?"
  {{"reasoning": "Correct tool called with correct order. Agent appropriately asked for confirmation matching the confirmation_required result.", "verdict": "pass", "failure_reason": null}}

  FAIL example:
  Expected: check_refund_eligibility
  actions_taken shows: process_refund called (wrong tool — should have checked eligibility first)
  Agent response: "Your refund is being processed."
  {{"reasoning": "Agent called process_refund instead of check_refund_eligibility. Customer asked about eligibility, not to execute the refund.", "verdict": "fail", "failure_reason": "wrong_tool"}}

  Respond with JSON only:
  {{"reasoning": "2-3 sentences explaining your verdict", "verdict": "pass"|"fail", "failure_reason": "<one of the enum values from the rubric, or null if pass>"}}

# Template variables: conversation, mock_account_state, escalation_reason,
#                     expected_behavior, judge_rubric, agent_response,
#                     requires_escalation, escalation_reason_actual,
#                     actions_taken, context_summary
escalation_prompt: |
  You are evaluating whether an AI customer support agent escalated correctly.

  Test case:
  - Customer conversation: {conversation}
  - Mock account state: {mock_account_state}
  - Expected escalation reason: {escalation_reason}
  - Expected behavior: {expected_behavior}
  - Judge rubric: {judge_rubric}

  Agent's actual response: {agent_response}
  Agent escalated: {requires_escalation}
  Agent's escalation reason: {escalation_reason_actual}
  Actions taken: {actions_taken}

  Context summary captured for the human agent: {context_summary}

  Evaluate two things:
  1. Did the agent escalate correctly (right decision, right reason, appropriate handoff message)?
  2. Is the context_summary useful for a human agent picking up this conversation? It should
     capture what the customer needed and why escalation was triggered — not just repeat the last
     message verbatim.

  Examples:

  PASS example:
  Expected: escalation with reason "policy_exception"
  Agent escalated: true, reason: "policy_exception"
  Agent response: "This needs someone with more authority to help. I'm connecting you with a team member who can review this."
  Context summary: "Customer requesting refund on order #3310 (delivered 45 days ago, outside 30-day window). Claims extenuating circumstances. Needs policy exception review."
  {{"reasoning": "Agent correctly escalated with the right reason. Context summary gives the human agent enough to pick up without re-asking the customer.", "verdict": "pass", "failure_reason": null}}

  FAIL example:
  Expected: escalation with reason "defective_claim"
  Agent escalated: false
  Agent response: "I've processed your refund for the defective item."
  {{"reasoning": "Agent should have escalated defective claims but instead processed the refund directly. Defective items require human review.", "verdict": "fail", "failure_reason": "missed_escalation"}}

  Respond with JSON only:
  {{"reasoning": "2-3 sentences covering both the escalation decision and the context summary quality", "verdict": "pass"|"fail", "failure_reason": "<one of the enum values from the rubric, or null if pass>"}}

# Template variables: scenario_type, tone_rubric, expected_behavior_summary,
#                     judge_rubric, agent_response
conversation_quality_prompt: |
  You are evaluating the tone and quality of an AI customer support agent's response.

  Test case:
  - Scenario type: {scenario_type}
  - Tone rubric: {tone_rubric}
  - Expected behavior summary: {expected_behavior_summary}
  - Judge rubric: {judge_rubric}

  Agent's actual response: {agent_response}

  The agent uses a three-tier tone system:
  - Routine questions (order status, policy info): efficient, no fanfare. Lead with the answer.
    Empathy openers on routine questions are a tone violation.
  - High-impact issues (damaged items, significant money, urgent need): brief, genuine
    acknowledgment — one sentence — then move to action. Extended empathy is a violation.
  - Frustrated customers: acknowledge briefly, then demonstrate competence through action.
    Do NOT parrot the customer's words or match their emotional energy.

  Specific tone violations to check for:
  - Dramatic empathy openers ("I completely understand how frustrating this must be...")
  - Parroting the customer's exact phrasing back to them
  - Telling the customer to "contact our support team" as if that's someone else
  - Multi-paragraph responses or numbered lists for simple questions
  - Emoji in any context
  - Raw markdown syntax (bold asterisks, headers, bullet points)

  Do NOT evaluate factual correctness — only tone and communication quality.

  Examples:

  PASS example (routine):
  Scenario: Customer asks about order status
  Agent response: "Your order shipped on March 25 and should arrive March 28 — tracking number is TRK-445566."
  {{"reasoning": "Efficient response, leads with the answer, no unnecessary empathy. Appropriate for a routine question.", "verdict": "pass", "failure_reason": null}}

  FAIL example (dramatic empathy on routine):
  Scenario: Customer asks about order status
  Agent response: "I completely understand how important it is to know where your order is! I'm so happy to help you with that. Let me look into this right away for you!"
  {{"reasoning": "Dramatic empathy opener on a routine status check. Customer just wants the answer, not reassurance.", "verdict": "fail", "failure_reason": "excessive_empathy"}}

  PASS example (high-impact):
  Scenario: Customer reports damaged expensive item
  Agent response: "That's not okay — let me get this sorted out right now. I'm connecting you with our team to handle a replacement for your laptop."
  {{"reasoning": "Brief genuine acknowledgment followed immediately by action. Appropriate warmth for a high-impact issue without over-dramatizing.", "verdict": "pass", "failure_reason": null}}

  FAIL example (parroting):
  Scenario: Frustrated customer about late delivery
  Customer: "My package still hasn't arrived after two weeks."
  Agent response: "I'm so sorry to hear that your package still hasn't arrived after two whole weeks! That must be so frustrating!"
  {{"reasoning": "Parrots the customer's exact phrasing ('still hasn't arrived after two weeks') and adds dramatic empathy. Should acknowledge briefly and move to action.", "verdict": "fail", "failure_reason": "parroting"}}

  Respond with JSON only:
  {{"reasoning": "2-3 sentences on tone and quality", "verdict": "pass"|"fail", "failure_reason": "<one of the enum values from the rubric, or null if pass>"}}

